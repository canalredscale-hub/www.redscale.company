final_outcome: "Ter um site atualizado e instalável como app no Windows ou macOS, com home institucional, CTAs estratégicos e landing pages de alta conversão levando ao checkout de produtos como planilhas, templates, treinamentos, consultorias, SaaS e ofertas relacionadas."
users: "Uso interno no início e depois público externo em formato de serviço e SaaS."
